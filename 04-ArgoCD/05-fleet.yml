apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-fleet
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/josuecodjo/0-fleet-infra.git
        revision: HEAD
        directories:
          - path: apps/*/*
          - path: apps/*/base
            exclude: true
  template:
    metadata:
      name: "{{path[1]}}-{{path[2]}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/josuecodjo/0-fleet-infra.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path[2]}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
