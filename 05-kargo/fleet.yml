apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: backend-fleet
---
apiVersion: v1
kind: Secret
metadata:
  name: fleet-infra-repo
  namespace: backend-fleet
  labels:
    kargo.akuity.io/cred-type: git
type: Opaque
stringData:
  repoURL: https://github.com/josuecodjo/0-fleet-infra.git
  username: josuecodjo
  password: YOUR_GITHUB_PAT
---
# ==========================================
# JAVA SERVICE SPOKE
# ==========================================
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: java-warehouse
  namespace: backend-fleet
spec:
  subscriptions:
    - image:
        repoURL: public.ecr.aws/nginx/nginx
        constraint: ">= 1.25.0"
        discoveryLimit: 2
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: java-dev
  namespace: backend-fleet
spec:
  # NEW SYNTAX: Replaces spec.subscriptions
  requestedFreight:
    - origin:
        kind: Warehouse
        name: java-warehouse
      sources:
        direct: true
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            {
              repoURL: "https://github.com/josuecodjo/0-fleet-infra.git",
              checkout: [{ branch: main, path: ./src }],
            }
        - uses: kustomize-set-image
          config:
            {
              path: ./src/apps/java-service/dev,
              images:
                [
                  {
                    name: public.ecr.aws/nginx/nginx,
                    newName: public.ecr.aws/nginx/nginx,
                    newTag: "${{ image.tag }}",
                  },
                ],
            }
        - uses: git-commit
          config: { path: ./src }
        - uses: git-push
          config: { path: ./src }
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: java-prod
  namespace: backend-fleet
spec:
  # NEW SYNTAX: Production gets it from the dev stage
  requestedFreight:
    - origin:
        kind: Warehouse
        name: java-warehouse
      sources:
        stages:
          - java-dev
  promotionTemplate:
    spec:
      steps:
        - uses: git-clone
          config:
            {
              repoURL: "https://github.com/josuecodjo/0-fleet-infra.git",
              checkout: [{ branch: main, path: ./src }],
            }
        - uses: kustomize-set-image
          config:
            {
              path: ./src/apps/java-service/prod,
              images:
                [
                  {
                    name: public.ecr.aws/nginx/nginx,
                    newName: public.ecr.aws/nginx/nginx,
                    newTag: "${{ image.tag }}",
                  },
                ],
            }
        - uses: git-commit
          config: { path: ./src }
        - uses: git-push
          config: { path: ./src }

---
